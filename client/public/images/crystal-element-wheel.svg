<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Playfair Display', serif">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#54464f"/>
      <stop offset="100%" stop-color="#474749"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="600" height="600" fill="url(#bgGrad)"/>

  <!-- scattered stars -->
  <g fill="#E8B86D" opacity="0.55">
    <circle cx="40" cy="60" r="1.6"/>
    <circle cx="90" cy="30" r="1.1"/>
    <circle cx="540" cy="50" r="1.6"/>
    <circle cx="565" cy="110" r="1.1"/>
    <circle cx="30" cy="520" r="1.4"/>
    <circle cx="60" cy="560" r="1.1"/>
    <circle cx="555" cy="540" r="1.6"/>
    <circle cx="520" cy="575" r="1.1"/>
    <circle cx="300" cy="20" r="1.3"/>
    <circle cx="300" cy="580" r="1.3"/>
    <circle cx="20" cy="300" r="1.3"/>
    <circle cx="580" cy="300" r="1.3"/>
  </g>
  <g fill="#E08AAA" opacity="0.5">
    <circle cx="110" cy="90" r="1.2"/>
    <circle cx="480" cy="90" r="1.2"/>
    <circle cx="100" cy="500" r="1.2"/>
    <circle cx="490" cy="500" r="1.2"/>
  </g>

  <!-- outer ring -->
  <circle cx="300" cy="300" r="255" fill="none" stroke="#6A4A5A" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="248" fill="none" stroke="#E8B86D" stroke-width="1"/>

  <!-- quadrant divider lines -->
  <line x1="300" y1="45" x2="300" y2="555" stroke="#6A4A5A" stroke-width="1"/>
  <line x1="45" y1="300" x2="555" y2="300" stroke="#6A4A5A" stroke-width="1"/>

  <!-- center medallion -->
  <circle cx="300" cy="300" r="70" fill="#2E2030" stroke="#E8B86D" stroke-width="1.5"/>
  <text x="300" y="292" text-anchor="middle" fill="#E8B86D" font-size="15" font-style="italic">Elemental</text>
  <text x="300" y="314" text-anchor="middle" fill="#E8B86D" font-size="15" font-style="italic">Crystal Wheel</text>

  <!-- WANDS - top -->
  <g>
    <text x="300" y="110" text-anchor="middle" fill="#E8B86D" font-size="20" font-style="italic">Wands</text>
    <text x="300" y="132" text-anchor="middle" fill="#D8C8C0" font-size="12">Fire</text>
    <circle cx="300" cy="160" r="26" fill="#F5EDE0" stroke="#C07080" stroke-width="1.5"/>
    <text x="300" y="165" text-anchor="middle" fill="#4A1A28" font-size="10">Carnelian</text>
    <text x="255" y="185" text-anchor="middle" fill="#D8C8C0" font-size="10">Sunstone</text>
    <text x="345" y="185" text-anchor="middle" fill="#D8C8C0" font-size="10">Tiger's Eye</text>
  </g>

  <!-- CUPS - right -->
  <g>
    <text x="500" y="285" text-anchor="middle" fill="#E08AAA" font-size="20" font-style="italic">Cups</text>
    <text x="500" y="360" text-anchor="middle" fill="#D8C8C0" font-size="12">Water</text>
    <circle cx="440" cy="300" r="26" fill="#F5EDE0" stroke="#C07080" stroke-width="1.5"/>
    <text x="440" y="305" text-anchor="middle" fill="#4A1A28" font-size="9">Rose Quartz</text>
    <text x="400" y="345" text-anchor="middle" fill="#D8C8C0" font-size="10">Aquamarine</text>
    <text x="400" y="258" text-anchor="middle" fill="#D8C8C0" font-size="10">Moonstone</text>
  </g>

  <!-- SWORDS - bottom -->
  <g>
    <text x="300" y="500" text-anchor="middle" fill="#80C8B0" font-size="20" font-style="italic">Swords</text>
    <text x="300" y="478" text-anchor="middle" fill="#D8C8C0" font-size="12">Air</text>
    <circle cx="300" cy="450" r="26" fill="#F5EDE0" stroke="#C07080" stroke-width="1.5"/>
    <text x="300" y="454" text-anchor="middle" fill="#4A1A28" font-size="9">Clear Quartz</text>
    <text x="255" y="430" text-anchor="middle" fill="#D8C8C0" font-size="10">Fluorite</text>
    <text x="345" y="430" text-anchor="middle" fill="#D8C8C0" font-size="10">Sodalite</text>
  </g>

  <!-- PENTACLES - left -->
  <g>
    <text x="100" y="285" text-anchor="middle" fill="#E8B86D" font-size="17" font-style="italic">Pentacles</text>
    <text x="100" y="360" text-anchor="middle" fill="#D8C8C0" font-size="12">Earth</text>
    <circle cx="160" cy="300" r="26" fill="#F5EDE0" stroke="#C07080" stroke-width="1.5"/>
    <text x="160" y="304" text-anchor="middle" fill="#4A1A28" font-size="7">Green Aventurine</text>
    <text x="200" y="258" text-anchor="middle" fill="#D8C8C0" font-size="10">Pyrite</text>
    <text x="200" y="345" text-anchor="middle" fill="#D8C8C0" font-size="10">Smoky Quartz</text>
  </g>

  <!-- outer ornamental stars at cardinal points -->
  <g fill="#E8B86D">
    <path d="M300,28 L303,36 L311,36 L304,41 L307,49 L300,44 L293,49 L296,41 L289,36 L297,36 Z"/>
    <path d="M300,568 L303,576 L311,576 L304,581 L307,589 L300,584 L293,589 L296,581 L289,576 L297,576 Z"/>
    <path d="M28,300 L31,308 L39,308 L32,313 L35,321 L28,316 L21,321 L24,313 L17,308 L25,308 Z"/>
    <path d="M572,300 L575,308 L583,308 L576,313 L579,321 L572,316 L565,321 L568,313 L561,308 L569,308 Z"/>
  </g>
</svg>
