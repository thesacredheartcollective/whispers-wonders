<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FBF7F2"/>
      <stop offset="100%" stop-color="#F1E9DE"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="220" fill="none" stroke="#C9B8A8" stroke-width="1.5"/>

  <!-- Four quadrant wedges -->
  <path d="M300,300 L300,80 A220,220 0 0,1 520,300 Z" fill="#E8D9C5" fill-opacity="0.55"/>
  <path d="M300,300 L520,300 A220,220 0 0,1 300,520 Z" fill="#D9C7B8" fill-opacity="0.55"/>
  <path d="M300,300 L300,520 A220,220 0 0,1 80,300 Z" fill="#CBB9C9" fill-opacity="0.45"/>
  <path d="M300,300 L80,300 A220,220 0 0,1 300,80 Z" fill="#C7CBB9" fill-opacity="0.45"/>

  <!-- Dividing lines -->
  <line x1="300" y1="80" x2="300" y2="520" stroke="#B7A493" stroke-width="1"/>
  <line x1="80" y1="300" x2="520" y2="300" stroke="#B7A493" stroke-width="1"/>

  <!-- Inner circle -->
  <circle cx="300" cy="300" r="72" fill="#FBF7F2" stroke="#B7A493" stroke-width="1.5"/>
  <text x="300" y="292" text-anchor="middle" font-size="15" fill="#6B5645" letter-spacing="1">A DAY OF</text>
  <text x="300" y="314" text-anchor="middle" font-size="15" fill="#6B5645" letter-spacing="1">TAMPA BAY</text>
  <text x="300" y="336" text-anchor="middle" font-size="15" fill="#6B5645" letter-spacing="1">PILGRIMAGE</text>

  <!-- Quadrant icons + labels -->
  <!-- Dawn: Weedon Island -->
  <circle cx="410" cy="190" r="26" fill="#F4EDE2" stroke="#A98F6E" stroke-width="1"/>
  <path d="M398,196 q12,-16 24,0" fill="none" stroke="#7C6A4E" stroke-width="2" stroke-linecap="round"/>
  <text x="410" y="145" text-anchor="middle" font-size="13" fill="#5C4A38" font-weight="bold">DAWN</text>
  <text x="410" y="240" text-anchor="middle" font-size="11.5" fill="#5C4A38">Weedon Island</text>
  <text x="410" y="255" text-anchor="middle" font-size="11.5" fill="#5C4A38">walk &amp; one-card pull</text>

  <!-- Mid-morning: Crystal shop -->
  <path d="M410,395 l14,20 l-14,20 l-14,-20 z" fill="#F4EDE2" stroke="#A98F6E" stroke-width="1"/>
  <text x="410" y="365" text-anchor="middle" font-size="13" fill="#5C4A38" font-weight="bold">MID-MORNING</text>
  <text x="410" y="450" text-anchor="middle" font-size="11.5" fill="#5C4A38">Crystal shop</text>
  <text x="410" y="465" text-anchor="middle" font-size="11.5" fill="#5C4A38">choose a stone</text>

  <!-- Midday: Plant-based lunch -->
  <circle cx="190" cy="410" r="24" fill="none" stroke="#A98F6E" stroke-width="1.5"/>
  <line x1="190" y1="410" x2="190" y2="392" stroke="#7C6A4E" stroke-width="2" stroke-linecap="round"/>
  <text x="190" y="365" text-anchor="middle" font-size="13" fill="#5C4A38" font-weight="bold">MIDDAY</text>
  <text x="190" y="450" text-anchor="middle" font-size="11.5" fill="#5C4A38">Plant-based lunch</text>
  <text x="190" y="465" text-anchor="middle" font-size="11.5" fill="#5C4A38">nourish the body</text>

  <!-- Late afternoon: Honeymoon Island sunset -->
  <circle cx="190" cy="190" r="22" fill="#E9C88B" stroke="#A98F6E" stroke-width="1"/>
  <line x1="150" y1="220" x2="230" y2="220" stroke="#A98F6E" stroke-width="1.5"/>
  <text x="190" y="145" text-anchor="middle" font-size="13" fill="#5C4A38" font-weight="bold">LATE AFTERNOON</text>
  <text x="190" y="245" text-anchor="middle" font-size="11.5" fill="#5C4A38">Honeymoon Island</text>
  <text x="190" y="260" text-anchor="middle" font-size="11.5" fill="#5C4A38">sunset release</text>

  <!-- Outer caption -->
  <text x="300" y="565" text-anchor="middle" font-size="10.5" fill="#8A7A66" font-style="italic">Whispers &amp; Wonders</text>
  <text x="300" y="580" text-anchor="middle" font-size="10.5" fill="#8A7A66" font-style="italic">a single intentional day — tarot, nature, community, nourishment</text>
</svg>
